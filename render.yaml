services:
  - type: web
    name: agrovision-olive-ai-api
    runtime: python
    plan: free
    rootDir: .
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.3
      - key: ALLOWED_ORIGINS
        sync: false
      - key: OPENWEATHER_API_KEY
        sync: false
      - key: OLLAMA_URL
        sync: false
      - key: OLLAMA_MODEL
        sync: false

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Disease Review Queue</title>
    <style>
      :root {
        --bg: #f4f7f1;
        --card: #ffffff;
        --border: #d7e2d2;
        --text: #1f3026;
        --muted: #597061;
        --accent: #2f6b3d;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: var(--bg);
        color: var(--text);
      }
      .wrap {
        max-width: 1200px;
        margin: 18px auto;
        padding: 0 14px;
        display: grid;
        gap: 12px;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 12px;
      }
      .top {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items: center;
      }
      .top .spacer { flex: 1; }
      button {
        border: 1px solid #adc1b1;
        background: #f8fbf6;
        color: var(--text);
        border-radius: 10px;
        padding: 8px 12px;
        cursor: pointer;
      }
      button.primary {
        border-color: transparent;
        background: linear-gradient(145deg, #2f6b3d, #4f8d5f);
        color: #fff;
      }
      .viewer {
        display: grid;
        grid-template-columns: 1.2fr 1fr;
        gap: 12px;
      }
      .img-box {
        background: #eef3ea;
        border-radius: 10px;
        border: 1px solid var(--border);
        min-height: 520px;
        display: grid;
        place-items: center;
        overflow: hidden;
      }
      .img-box img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        background: #eef3ea;
      }
      .meta {
        display: grid;
        gap: 8px;
        font-size: 14px;
      }
      .meta-line { line-height: 1.45; word-break: break-word; }
      .label-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }
      .label-btn {
        text-align: left;
        font-size: 13px;
        padding: 8px;
      }
      .kbd {
        display: inline-block;
        min-width: 20px;
        border: 1px solid #c4d2c7;
        border-radius: 6px;
        text-align: center;
        margin-right: 6px;
        padding: 1px 4px;
        color: var(--muted);
        background: #fff;
      }
      .muted { color: var(--muted); }
      textarea {
        width: 100%;
        min-height: 72px;
        border-radius: 8px;
        border: 1px solid #c7d6ca;
        padding: 8px;
      }
      @media (max-width: 980px) {
        .viewer { grid-template-columns: 1fr; }
        .label-grid { grid-template-columns: 1fr; }
        .img-box { min-height: 320px; }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card top">
        <button id="prevBtn">◀ Prev</button>
        <button id="nextBtn">Next ▶</button>
        <span id="progress" class="muted"></span>
        <div class="spacer"></div>
        <button id="applyBtn" class="primary">Apply Moves</button>
      </div>

      <div class="card viewer">
        <div class="img-box">
          <img id="img" alt="review" />
        </div>
        <div>
          <div class="meta" id="meta"></div>
          <div style="height:8px"></div>
          <textarea id="notes" placeholder="Optional notes for this item..."></textarea>
          <div style="height:8px"></div>
          <div class="label-grid" id="labelGrid"></div>
        </div>
      </div>

      <div class="card muted">
        Keyboard shortcuts: ←/→ navigate, 1..0 and Q/W/E for labels.
      </div>
    </div>

    <script>
      let rows = [];
      let labels = [];
      let idx = 0;
      let selected = "";

      const imgEl = document.getElementById("img");
      const metaEl = document.getElementById("meta");
      const progressEl = document.getElementById("progress");
      const notesEl = document.getElementById("notes");
      const labelGrid = document.getElementById("labelGrid");

      function esc(v) { return (v ?? "").toString(); }

      async function api(url, opts) {
        const res = await fetch(url, opts);
        if (!res.ok) throw new Error(await res.text());
        return res.json();
      }

      function renderLabels() {
        labelGrid.innerHTML = "";
        labels.forEach((item) => {
          const b = document.createElement("button");
          b.className = "label-btn";
          b.innerHTML = `<span class="kbd">${item.shortcut.toUpperCase()}</span>${item.label}`;
          b.onclick = () => assignLabel(item.label);
          labelGrid.appendChild(b);
        });
      }

      function render() {
        if (!rows.length) {
          metaEl.innerHTML = "<div>No review rows found.</div>";
          imgEl.removeAttribute("src");
          progressEl.textContent = "0 / 0";
          return;
        }
        if (idx < 0) idx = 0;
        if (idx >= rows.length) idx = rows.length - 1;
        const row = rows[idx];
        selected = row.final_label || "";
        notesEl.value = row.notes || "";
        imgEl.src = `/api/image/${encodeURIComponent(row.id)}?t=${Date.now()}`;
        metaEl.innerHTML = `
          <div class="meta-line"><b>File:</b> ${esc(row.source_path)}</div>
          <div class="meta-line"><b>Source dataset:</b> ${esc(row.source_dataset)}</div>
          <div class="meta-line"><b>Predicted route:</b> ${esc(row.predicted_route)}</div>
          <div class="meta-line"><b>Predicted label:</b> ${esc(row.predicted_label)}</div>
          <div class="meta-line"><b>Confidence:</b> ${Number(row.confidence || 0).toFixed(3)}</div>
          <div class="meta-line"><b>route_reason:</b> ${esc(row.route_reason)}</div>
          <div class="meta-line"><b>Selected:</b> ${selected || "-"}</div>
        `;
        const labeled = rows.filter(r => r.final_label).length;
        progressEl.textContent = `${idx + 1} / ${rows.length}  |  labeled: ${labeled}`;
      }

      async function assignLabel(label) {
        if (!rows.length) return;
        const row = rows[idx];
        const payload = { row_id: row.id, final_label: label, notes: notesEl.value || "" };
        await api("/api/decision", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
        row.final_label = label;
        row.notes = notesEl.value || "";
        if (idx < rows.length - 1) idx += 1;
        render();
      }

      async function applyMoves() {
        const out = await api("/api/apply", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ mode: "move" }),
        });
        alert(`Apply done. moved=${out.result.moved}, skipped=${out.result.skipped}, errors=${out.result.errors.length}`);
        const q = await api("/api/queue");
        rows = q.rows;
        render();
      }

      function handleKey(e) {
        if (["INPUT", "TEXTAREA"].includes((document.activeElement?.tagName || "").toUpperCase())) return;
        if (e.key === "ArrowLeft") { idx -= 1; render(); return; }
        if (e.key === "ArrowRight") { idx += 1; render(); return; }
        const key = e.key.toLowerCase();
        const m = labels.find(x => x.shortcut.toLowerCase() === key);
        if (m) { assignLabel(m.label); }
      }

      async function init() {
        const l = await api("/api/labels");
        labels = l.labels || [];
        renderLabels();
        const q = await api("/api/queue");
        rows = q.rows || [];
        render();
      }

      document.getElementById("prevBtn").onclick = () => { idx -= 1; render(); };
      document.getElementById("nextBtn").onclick = () => { idx += 1; render(); };
      document.getElementById("applyBtn").onclick = applyMoves;
      document.addEventListener("keydown", handleKey);
      init().catch((err) => {
        metaEl.innerHTML = `<div style="color:#b03030">Failed to load review tool: ${esc(err.message)}</div>`;
      });
    </script>
  </body>
</html>
